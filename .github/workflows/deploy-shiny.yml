name: Deploy Shiny app

on:
  schedule:
    - cron: "0 6 11 1,4,7,10 *" 
  workflow_dispatch:        # allows manual run

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2

      - name: Install workflow packages
        run: |
          Rscript -e 'Sys.unsetenv("RSPM"); options(repos = c(CRAN = "https://cloud.r-project.org")); install.packages(c("rsconnect", "httr", "jsonlite"), repos = "https://cloud.r-project.org")'
            
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          libuv1-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libharfbuzz-dev \
          libfribidi-dev \
          libcurl4-openssl-dev \
          libssl-dev \
          libxml2-dev \
          libgit2-dev \
          libglpk-dev

      - name: Install R packages
        run: |
            Rscript -e 'install.packages(c(
                "rsconnect",
                "arrow",
                "dplyr",
                "ggplot2",
                "DT",
                "plotly",
                "shiny",
                "zoo"
            ), repos = "https://cloud.r-project.org")'

      - name: Rebuild data
        env:
          GITHUB_PAT: ${{ secrets.DATA_REPO_PAT  }}
        run: Rscript data_download.R
      
      - name: Check downloaded data
        run: |
            find data -type f | head
            du -sh data

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          RENV_CONFIG_REPOS_OVERRIDE: https://cloud.r-project.org
        run: |
          Rscript -e 'Sys.unsetenv("RSPM"); options(repos = c(CRAN = "https://cloud.r-project.org")); rsconnect::setAccountInfo(
            name = Sys.getenv("SHINYAPPS_ACCOUNT"),
            token = Sys.getenv("SHINYAPPS_TOKEN"),
            secret = Sys.getenv("SHINYAPPS_SECRET")
          ); rsconnect::deployApp(
            appDir = ".",
            appFiles = c("app.R", "data"),
            forceUpdate = TRUE,
            logLevel = "verbose"
          )'